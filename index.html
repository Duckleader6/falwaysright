<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact Checker</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background-color: #1e1e1e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #252526; border-bottom: 1px solid #3e3e42; }
        .header h1 { font-size: 20px; }
        .btn { padding: 8px 16px; background-color: #007acc; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 14px; }
        .btn:hover { background-color: #005a9e; }
        .container { flex: 1; display: flex; flex-direction: column; margin: 10px; overflow: hidden; }
        .output { flex: 1; overflow-y: auto; padding: 15px; white-space: pre-wrap; word-wrap: break-word; background-color: #1e1e1e; border: 1px solid #3e3e42; border-radius: 4px; margin-bottom: 10px; }
        .input-line { display: flex; gap: 8px; }
        .input-line input { flex: 1; background-color: #1e1e1e; border: 1px solid #3e3e42; color: #e0e0e0; padding: 6px 10px; font-family: 'Courier New', monospace; border-radius: 2px; }
        .input-line input:focus { outline: none; border-color: #007acc; }
        .input-line button { padding: 6px 12px; background-color: #007acc; color: white; border: none; border-radius: 2px; cursor: pointer; font-family: 'Courier New', monospace; }
        .input-line button:hover { background-color: #005a9e; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #464647; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #5a5a5a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Fact Checker</h1>
        <button class="btn" onclick="window.location.href='conversiontable.html';">📋 Conversion Table</button>
    </div>
    <div class="container">
        <div class="output" id="output">Loading Python environment...</div>
        <div class="input-line">
            <input type="text" id="input" disabled placeholder="Waiting for Python to load..." autocomplete="off">
            <button id="sendBtn" onclick="submitInput()" disabled>Send</button>
        </div>
    </div>

    <script>
        let inputResolve = null;
        const outputEl = document.getElementById('output');
        const inputEl  = document.getElementById('input');
        const sendBtn  = document.getElementById('sendBtn');

        function jsRequestInput(prompt) {
            appendOutput(prompt);
            return new Promise(resolve => { inputResolve = resolve; });
        }

        function submitInput() {
            const val = inputEl.value;
            inputEl.value = '';
            if (inputResolve) {
                appendOutput(val + '\n');
                inputResolve(val);
                inputResolve = null;
            }
        }

        function appendOutput(text) {
            if (outputEl.dataset.fresh !== 'true') {
                outputEl.textContent = '';
                outputEl.dataset.fresh = 'true';
            }
            outputEl.textContent += text;
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        inputEl.addEventListener('keypress', e => { if (e.key === 'Enter') submitInput(); });

        async function init() {
            try {
                const py = await loadPyodide();

                py.globals.set('_js_request_input', py.toPy(jsRequestInput));
                py.globals.set('_js_print',         py.toPy(appendOutput));

                await py.runPythonAsync(`
import sys, builtins

class JSStdout:
    def write(self, text):
        _js_print(text)
        return len(text)
    def flush(self):
        pass

sys.stdout = JSStdout()
sys.stderr = JSStdout()

async def async_input(prompt=""):
    result = await _js_request_input(prompt)
    return result

builtins.input = async_input
`);

                inputEl.disabled = false;
                inputEl.placeholder = 'Type here and press Enter...';
                sendBtn.disabled = false;

                // Step 1: run alwaysright.py — only defines async def main(), does NOT call it
                const resp = await fetch('alwaysright.py');
                if (!resp.ok) throw new Error('Could not load alwaysright.py: ' + resp.status);
                const code = await resp.text();
                await py.runPythonAsync(code);

                const mainExists = py.runPython('"main" in globals()');
                if (!mainExists) throw new Error('main() is not defined in alwaysright.py');

                // Step 2: call main() from JS so there's no top-level await problem in .py
                await py.runPythonAsync('await globals()["main"]()');

            } catch (e) {
                outputEl.textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
